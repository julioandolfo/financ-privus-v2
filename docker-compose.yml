# =============================================================================
# Docker Compose — Coolify Compatible
#
# Deploy no Coolify:
#   1. New Resource → Docker Compose → cole a URL do repositório
#   2. As variáveis abaixo aparecem automaticamente na aba "Environment"
#   3. Coolify injeta APP_KEY, domínio e SSL sozinho
#   4. Clique em Deploy — tudo sobe junto (app + MySQL + Redis)
# =============================================================================

services:

  # ─── Aplicação Laravel ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      # App
      APP_NAME: ${APP_NAME:-Financ Privus}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}

      # Database — aponta para o serviço "db" deste compose
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-financeiro}
      DB_USERNAME: ${DB_USERNAME:-financeiro}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      # Cache / Session / Queue — usa Redis deste compose
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: ${SESSION_LIFETIME:-43200}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Mail
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@seudominio.com}
      MAIL_FROM_NAME: ${APP_NAME:-Financ Privus}

      # Integrações Bancárias
      BANCO_ITAU_CLIENT_ID: ${BANCO_ITAU_CLIENT_ID:-}
      BANCO_ITAU_CLIENT_SECRET: ${BANCO_ITAU_CLIENT_SECRET:-}
      BANCO_BRADESCO_TOKEN: ${BANCO_BRADESCO_TOKEN:-}
      SICOOB_CLIENT_ID: ${SICOOB_CLIENT_ID:-}
      SICOOB_CLIENT_SECRET: ${SICOOB_CLIENT_SECRET:-}
      SICREDI_TOKEN: ${SICREDI_TOKEN:-}

      # MercadoPago
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}

      # WhatsApp (Evolution API)
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      # WooCommerce
      WOOCOMMERCE_URL: ${WOOCOMMERCE_URL:-}
      WOOCOMMERCE_KEY: ${WOOCOMMERCE_KEY:-}
      WOOCOMMERCE_SECRET: ${WOOCOMMERCE_SECRET:-}

    expose:
      - "80"
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ─── MySQL 8.4 ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-financeiro}
      MYSQL_USER: ${DB_USERNAME:-financeiro}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  storage_app:
  storage_logs:
